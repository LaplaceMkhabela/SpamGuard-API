version: '3.8'

services:
  redis_db:
    image: "redis:alpine"
    ports:
      - "6379:6379"
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web_app:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      redis_db:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1